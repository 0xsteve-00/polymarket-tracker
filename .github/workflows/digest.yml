name: Daily Whale Digest

# Ringkasan harian jam 07:00 WIB (00:00 UTC) + bisa manual.
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Pakai DB yang sama dengan tracker biar datanya nyambung
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: tracker.db
          key: tracker-db-digest-${{ github.run_id }}
          restore-keys: |
            tracker-db-

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 whale_tracker.py digest --hours 24 --send
